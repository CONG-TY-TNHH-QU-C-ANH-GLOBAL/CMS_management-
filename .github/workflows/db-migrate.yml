name: Apply D1 Migrations (production)

# Manual-only — never auto-trigger. Migrations are idempotent (Wrangler tracks
# applied state in d1_migrations table), but a destructive ALTER could still
# corrupt prod, so this requires explicit human dispatch.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "MIGRATE PROD" to confirm'
        required: true

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Verify confirmation
        if: ${{ github.event.inputs.confirm != 'MIGRATE PROD' }}
        run: |
          echo "::error::Confirmation phrase mismatch. Expected 'MIGRATE PROD'."
          exit 1

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: List pending migrations (dry view)
        run: bunx wrangler d1 migrations list thg-cms --remote || true

      - name: Apply migrations
        run: bunx wrangler d1 migrations apply thg-cms --remote

      - name: Verify schema (count tables)
        run: |
          set -euo pipefail
          OUTPUT=$(bunx wrangler d1 execute thg-cms --remote --command "SELECT COUNT(*) AS n FROM sqlite_master WHERE type='table'" --json 2>/dev/null || echo '[]')
          echo "Schema query: $OUTPUT"
