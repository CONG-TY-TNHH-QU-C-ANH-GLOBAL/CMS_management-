name: Deploy CMS to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dryrun:
        description: "Dry run (build + validate, skip deploy)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cms-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Deploy (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dryrun == 'true'
        run: bunx wrangler deploy --dry-run

      - name: Deploy (live)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dryrun != 'true'
        run: bunx wrangler deploy

      - name: Smoke test API
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dryrun != 'true'
        run: |
          set -euo pipefail
          # Wait briefly for Cloudflare edge propagation before assertions.
          sleep 5

          # ── 1) /translations: long-lived endpoint, returns the i18n dict ───
          STATUS=$(curl -s -o /tmp/body.json -w "%{http_code}" "https://cms.thgfulfill.com/api/v1/translations?lang=vi" || echo 000)
          echo "translations status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed on /translations (HTTP $STATUS). Response body:"
            cat /tmp/body.json || true
            exit 1
          fi
          KEYS=$(jq '.translations | length' /tmp/body.json 2>/dev/null || echo 0)
          echo "Translation keys returned: $KEYS"
          if [ "$KEYS" -lt 100 ]; then
            echo "::warning::Translation count suspiciously low ($KEYS)"
          fi

          # ── 2) /openapi: registration integrity check ─────────────────────
          # Catches the failure mode where Vite tree-shakes the side-effect
          # `import "./paths"` and the worker ships without any registered
          # routes. We cache-bust because the response has
          # `Cache-Control: s-maxage=300` and edge may still hold the
          # pre-deploy version for a few minutes.
          OPENAPI_STATUS=$(curl -s -o /tmp/openapi.json -w "%{http_code}" "https://cms.thgfulfill.com/api/v1/openapi?_t=$(date +%s)" || echo 000)
          echo "openapi status: $OPENAPI_STATUS"
          if [ "$OPENAPI_STATUS" != "200" ]; then
            echo "::error::Smoke test failed on /openapi (HTTP $OPENAPI_STATUS). Response body:"
            cat /tmp/openapi.json || true
            exit 1
          fi
          PATH_COUNT=$(jq '.paths | length' /tmp/openapi.json 2>/dev/null || echo 0)
          echo "OpenAPI paths registered: $PATH_COUNT"
          if [ "$PATH_COUNT" -lt 1 ]; then
            echo "::error::/api/v1/openapi has zero registered paths. The bundler likely tree-shook src/openapi/paths.ts. Verify package.json sideEffects includes '**/openapi/paths.ts'."
            jq '.' /tmp/openapi.json || cat /tmp/openapi.json
            exit 1
          fi
