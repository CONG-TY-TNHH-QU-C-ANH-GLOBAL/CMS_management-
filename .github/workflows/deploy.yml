name: Deploy CMS to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dryrun:
        description: "Dry run (build + validate, skip deploy)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cms-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Deploy (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dryrun == 'true'
        run: bunx wrangler deploy --env production --dry-run

      - name: Deploy (live)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dryrun != 'true'
        run: bunx wrangler deploy --env production

      - name: Smoke test API
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dryrun != 'true'
        run: |
          set -euo pipefail
          # Wait briefly for Cloudflare edge propagation, then hit a known endpoint.
          sleep 5
          STATUS=$(curl -s -o /tmp/body.json -w "%{http_code}" "https://cms.thgfulfill.com/api/v1/translations?lang=vi" || echo 000)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed (HTTP $STATUS). Response body:"
            cat /tmp/body.json || true
            exit 1
          fi
          KEYS=$(jq '.translations | length' /tmp/body.json 2>/dev/null || echo 0)
          echo "Translation keys returned: $KEYS"
          if [ "$KEYS" -lt 100 ]; then
            echo "::warning::Translation count suspiciously low ($KEYS)"
          fi
