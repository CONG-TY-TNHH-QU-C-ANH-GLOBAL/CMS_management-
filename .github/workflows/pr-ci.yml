name: PR CI Gate

# Validation-only gate for PRs and feature branches. Mirrors the pre-deploy
# checks (typecheck → test → build) but NEVER deploys, NEVER uses production
# secrets, and NEVER runs migrations. Production deploy stays solely in
# deploy.yml (push to main). Purpose: block unvalidated PRs before they merge
# to main and trigger the production deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "fix/**"
      - "feature/**"
      - "chore/**"
      - "ci/**"

# Read-only: no deploy, no secret-backed actions.
permissions:
  contents: read

# Cancel superseded runs for the same PR / branch.
concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build
        run: bun run build

      - name: OpenAPI contract drift
        # In-process schema identity check (no network/secrets). Catches the
        # Phase-D failure mode where a handler's response shape drifts from its
        # declared OpenAPI schema.
        run: bun run check:openapi-drift

      - name: Lint (pricing module)
        # Repo-wide `eslint .` has large pre-existing formatting debt, so this
        # gate scopes lint to the actively-maintained pricing surface. Widen to
        # the whole repo after a one-time `prettier --write .` + .gitattributes.
        run: bunx eslint src/features/pricing/ src/routes/admin/sales/pricing/
